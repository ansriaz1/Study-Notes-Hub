<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Notes</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h2>📚 Study Notes</h2>

<input id="search" placeholder="Search pages">

<button id="newPage">➕ New Page</button>

<button id="deletePage">🗑 Delete Page</button>

<button id="darkToggle">🌙</button>

</header>


<div class="container">

<aside id="pages"></aside>


<main>

<div id="toolbar">

<button onclick="format('bold')"><b>B</b></button>

<button onclick="format('italic')"><i>I</i></button>

<button onclick="format('underline')"><u>U</u></button>

<button onclick="format('insertUnorderedList')">• List</button>

<button onclick="uploadImage()">🖼 Image</button>

</div>


<div id="editor" contenteditable="true"></div>

<div class="info">

<span id="wordCount"></span>

<span id="lastEdit"></span>

</div>

</main>

</div>


<!-- hidden gallery picker -->
<input type="file" id="imageInput" accept="image/*" style="display:none">


<script src="app.js"></script>

<script>

/* IMAGE FROM GALLERY */

function uploadImage(){
document.getElementById("imageInput").click();
}

document.getElementById("imageInput").addEventListener("change",function(){

const file=this.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

const img=document.createElement("img");
img.src=e.target.result;
img.style.maxWidth="100%";

document.getElementById("editor").appendChild(img);

};

reader.readAsDataURL(file);

});


/* DELETE PAGE FUNCTION */

document.getElementById("deletePage").addEventListener("click",function(){

const pages=document.getElementById("pages");
const active=pages.querySelector(".active");

if(!active){
alert("Select a page first");
return;
}

if(confirm("Delete this page?")){
active.remove();
document.getElementById("editor").innerHTML="";
}

});


/* PAGE SELECTION */

document.getElementById("pages").addEventListener("click",function(e){

const items=pages.querySelectorAll("div,li");

items.forEach(p=>p.classList.remove("active"));

if(e.target.tagName==="DIV" || e.target.tagName==="LI"){
e.target.classList.add("active");
}

});

</script>

</body>
</html>
