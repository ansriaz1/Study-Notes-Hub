<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Notes</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h2>📚 Study Notes</h2>

<input id="search" placeholder="Search pages">

<button id="newPage">➕ New Page</button>

<button id="deletePage">🗑 Delete Page</button>

<button id="darkToggle">🌙</button>

</header>


<div class="container">

<aside id="pages"></aside>


<main>

<div id="toolbar">

<button onclick="format('bold')"><b>B</b></button>

<button onclick="format('italic')"><i>I</i></button>

<button onclick="format('underline')"><u>U</u></button>

<button onclick="format('insertUnorderedList')">• List</button>

<button onclick="uploadImage()">🖼 Image</button>

</div>


<div id="editor" contenteditable="true"></div>

<div class="info">

<span id="wordCount"></span>

<span id="lastEdit"></span>

</div>

</main>

</div>

<script src="app.js"></script>

</body>
  </html>
